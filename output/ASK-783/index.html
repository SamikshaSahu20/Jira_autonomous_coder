<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Task Dashboard</title>
  <link rel="stylesheet" href="dashboardStyles.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Team Task Dashboard</h1>
      <button id="theme-toggle">Toggle Dark Mode</button>
    </header>
    <main>
      <section id="landing">
        <h2>Welcome to the Team Task Dashboard</h2>
        <div class="progress-indicator"></div>
      </section>
      <section id="dashboard-cards">
        <!-- Dashboard cards will be dynamically rendered here -->
      </section>
      <section id="team-section">
        <!-- Team profiles will be dynamically rendered here -->
      </section>
      <section id="task-tracker">
        <!-- Kanban board will be dynamically rendered here -->
      </section>
      <section id="notifications">
        <!-- Notifications will be dynamically rendered here -->
      </section>
    </main>
  </div>
  <script src="index.js"></script>
</body>
</html>
